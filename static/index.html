<html lang="zh-CN">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 30px;
        }

        .input-section {
            margin-bottom: 25px;
        }

        .input-section label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .input-section textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-section textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
        }

        .ai-switch {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .ai-switch label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #555;
            font-size: 1rem;
        }

        .ai-switch input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .ai-switch .description {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
            width: 100%;
        }

        .text-mode-switch {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 12px;
            border: 1px solid #b6d4fe;
        }

        .text-mode-switch label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #1d4ed8;
            font-size: 1rem;
        }

        .text-mode-switch input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #3b82f6;
        }

        .ai-enhance-switch {
            margin-top: 10px;
            padding: 12px;
            background: #fff3cd;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            display: none;
        }

        .ai-enhance-switch.show {
            display: block;
        }

        .ai-enhance-switch label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #856404;
            font-size: 0.95rem;
        }

        .ai-enhance-switch input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .file-upload-section {
            margin-top: 15px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
            display: none;
        }

        .file-upload-section.show {
            display: block;
        }

        .file-upload-section label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #166534;
            font-size: 0.95rem;
        }

        .file-upload-section input[type="file"] {
            display: none;
        }

        .file-upload-section .file-label {
            display: inline-block;
            padding: 8px 20px;
            background: #22c55e;
            color: white;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-upload-section .file-label:hover {
            background: #16a34a;
        }

        .file-upload-section .file-info {
            font-size: 0.85rem;
            color: #059669;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #f0f0f0;
        }

        .result-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .highlighted-text {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            line-height: 1.8;
            font-size: 1.1rem;
            color: #333;
            min-height: 80px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .highlighted-text mark {
            font-weight: 600;
            border-radius: 4px;
        }

        .entities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .entity-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .entity-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .entity-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .entity-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
        }

        .stats-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .entity-legend {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .entity-legend h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .legend-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-text {
            font-size: 0.9rem;
            color: #555;
        }

        .example-texts {
            margin-top: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 12px;
        }

        .example-texts p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .example-texts .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .example-tag {
            background: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #667eea;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #e0e0e0;
        }

        .example-tag:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .error-message {
            background: #ffebee;
            border-left: 4px solid #e53935;
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
            margin-top: 15px;
            color: #c62828;
            display: none;
        }

        .ai-indicator {
            display: inline-block;
            padding: 4px 10px;
            background: #28a745;
            color: white;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .document-indicator {
            display: inline-block;
            padding: 4px 10px;
            background: #17a2b8;
            color: white;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .main-card {

            }

            .stats-section {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
                justify-content: center;
                margin-bottom: 10px;
            }

            .btn-secondary {
                margin-left: 0;
            }

            .ai-switch {
                flex-direction: column;
                align-items: flex-start;
            }

            .text-mode-switch {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

    <div class="container">
        <div class="header">
            <h1>🏷️ 中文命名实体识别系统</h1>
            <p>基于BERT的中文命名实体识别演示（支持AI增强和长篇文档处理）</p>
        </div>

        <div class="main-card">
            <div class="input-section">
                <label for="input-text">输入待识别的文本或上传文档</label>
                <textarea id="input-text" placeholder="请在此输入中文文本，例如：李白在家玩苹果公司研发的苹果手机&#10;&#10;或选择下方的长篇文章模式上传文档文件"></textarea>
                
                <div style="margin-top: 15px;">
                    <button class="btn" id="submit-btn">
                        <span>开始识别</span>
                    </button>
                    <button class="btn btn-secondary" id="clear-btn">
                        <span>清空内容</span>
                    </button>
                </div>

                <div class="text-mode-switch">
                    <label>
                        <input type="radio" name="text-mode" value="normal" checked>
                        <span>📝 普通文本</span>
                    </label>
                    <label>
                        <input type="radio" name="text-mode" value="document">
                        <span>📄 长篇文章</span>
                    </label>
                    <div class="description" style="color: #666; font-size: 0.85rem; margin-top: 5px;">长篇文章模式支持句子分割、逐句识别、结果整合</div>
                </div>

                <div class="file-upload-section" id="file-upload-section">
                    <label for="file-input">
                        <span class="file-label">📁 选择文档文件</span>
                    </label>
                    <input type="file" id="file-input" accept=".txt,.md,.docx">
                    <div class="file-info">支持格式：txt、md、docx</div>
                </div>

                <div class="ai-switch">
                    <label>
                        <input type="radio" name="ai-mode" value="local" checked>
                        <span>📦 本地识别</span>
                    </label>
                    <label>
                        <input type="radio" name="ai-mode" value="api">
                        <span>🤖 后端API</span>
                    </label>
                    <div class="description">后端API支持AI增强识别（需后端服务运行）</div>
                </div>

                <div class="ai-enhance-switch" id="ai-enhance-switch">
                    <label>
                        <input type="checkbox" id="use-ai-checkbox">
                        <span>🔮 使用AI智能判定（需Ollama本地模型或API密钥）</span>
                    </label>
                </div>
            </div>

            <div class="example-texts">
                <p>💡 尝试示例文本：</p>
                <div class="examples">
                    <span class="example-tag">李白在家玩苹果手机</span>
                    <span class="example-tag">习近平主席在人民大会堂</span>
                    <span class="example-tag">特朗普访问北京故宫</span>
                    <span class="example-tag">王者荣耀是一款热门游戏</span>
                </div>
            </div>

            <div class="error-message" id="error-message"></div>

            <div class="result-section" id="result-section" style="display: none;">
                <h3>📝 识别结果 <span id="ai-badge" style="display: none;" class="ai-indicator">AI增强</span><span id="doc-badge" style="display: none;" class="document-indicator">长篇文档</span></h3>
                <div class="highlighted-text" id="highlighted-text"></div>

                <h3 style="margin-top: 25px;">🏷️ 识别到的实体</h3>
                <div class="entities-grid" id="entities-grid"></div>

                <div class="stats-section">
                    <div class="stat-item">
                        <div class="stat-number" id="stat-total">0</div>
                        <div class="stat-label">实体总数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="stat-types">0</div>
                        <div class="stat-label">实体类型</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="stat-sentences">0</div>
                        <div class="stat-label">处理句子数</div>
                    </div>
                </div>
            </div>

            <div class="entity-legend">
                <h4>🎨 实体类型图例</h4>
                <div class="legend-grid" id="legend-grid"></div>
            </div>
        </div>

        </div>
    </div>

        function removeInvalidSingleChars(entities) {
            const INVALID_CHARS = new Set(['的', '在', '是', '了', '和', '与', '或', '都', '也', '很', '把', '被', '让', '给', '用', '对', '这', '那', '你', '我', '他', '她', '它', '们', '有', '没', '要', '能', '会', '可', '以', '说', '看', '想', '知', '道', '来', '去', '进', '出', '上', '下', '左', '右', '前', '后', '里', '外', '大', '小', '多', '少', '好', '坏', '新', '旧', '高', '低', '长', '短', '快', '慢', '轻', '重', '冷', '热', '南', '北', '东', '西', '机', '话', '号', '本', '为', '于', '从', '当', '其', '此', '每', '各', '所']);
            return entities.filter(entity => !(entity.value.length === 1 && INVALID_CHARS.has(entity.value)));
        }

        function addAllPossibleTypes(entities) {
            const entityDict = {};
            for (const entity of entities) {
                if (!entityDict[entity.value]) {
                    entityDict[entity.value] = new Set();
                }
                entityDict[entity.value].add(entity.type);
            }

            for (const entity in entityDict) {
                for (const [kbType, kbList] of Object.entries(knowledgeBase)) {
                    if (kbList.includes(entity) && !entityDict[entity].has(kbType)) {
                        entityDict[entity].add(kbType);
                    }
                }
            }

            const result = [];
            for (const [entity, types] of Object.entries(entityDict)) {
                for (const entityType of types) {
                    result.push({ type: entityType, type_cn: entityTypeNames[entityType] || entityType, value: entity });
                }
            }

            return result;
        }

        function deduplicateByContext(entities, text) {
            const sortedEntities = [...entities].sort((a, b) => b.value.length - a.value.length);
            
            const filtered = [];
            for (const entity of sortedEntities) {
                let isSubstring = false;
                for (const existing of filtered) {
                    if (entity.value.includes(existing.value) && entity.value !== existing.value) {
                        isSubstring = true;
                        break;
                    }
                }
                if (!isSubstring) {
                    filtered.push(entity);
                }
            }

            const entityDict = {};
            for (const entity of filtered) {
                if (!entityDict[entity.value]) {
                    entityDict[entity.value] = [];
                }
                if (!entityDict[entity.value].includes(entity.type)) {
                    entityDict[entity.value].push(entity.type);
                }
            }

            const result = [];
            for (const [entity, types] of Object.entries(entityDict)) {
                for (const t of types) {
                    result.push({ type: t, type_cn: entityTypeNames[t] || t, value: entity });
                }
            }

            return result.sort((a, b) => text.indexOf(a.value) - text.indexOf(b.value));
        }

        function knowledgeBasedNer(text) {
            const entities = [];
            
            for (const [entityType, entityList] of Object.entries(knowledgeBase)) {
                for (const entity of entityList) {
                    if (entity.length >= 2 && text.includes(entity)) {
                        entities.push({ type: entityType, type_cn: entityTypeNames[entityType] || entityType, value: entity });
                    } else if (entity.length === 1 && text.includes(entity)) {
                        if (['狗', '猫', '花', '草', '树', '鱼', '鸟', '虫', '米', '面', '肉', '茶', '酒', '糖', '盐', '油'].includes(entity)) {
                            entities.push({ type: entityType, type_cn: entityTypeNames[entityType] || entityType, value: entity });
                        }
                    }
                }
            }
            
            const entitySet = new Set();
            const uniqueEntities = [];
            
            for (const entity of entities) {
                const key = `${entity.type}-${entity.value}`;
                if (!entitySet.has(key)) {
                    entitySet.add(key);
                    uniqueEntities.push(entity);
                }
            }
            
            return uniqueEntities;
        }

        async function recognizeText() {
            const text = document.getElementById('input-text').value.trim();
            const submitBtn = document.getElementById('submit-btn');
            const errorMessage = document.getElementById('error-message');
            const resultSection = document.getElementById('result-section');
            const aiBadge = document.getElementById('ai-badge');
            const docBadge = document.getElementById('doc-badge');
            const aiMode = document.querySelector('input[name="ai-mode"]:checked').value;
            const textMode = document.querySelector('input[name="text-mode"]:checked').value;
            const useAi = document.getElementById('use-ai-checkbox').checked;

            if (!text) {
                errorMessage.textContent = '请输入有效文本';
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';
            aiBadge.style.display = 'none';
            docBadge.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span><span>识别中...</span>';

            try {
                let entities;
                let processedSentences = 0;
                
                if (aiMode === 'api') {
                    const isDocument = textMode === 'document';
                    const response = await fetch('/api/ner', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ 
                            text: text, 
                            use_ai: useAi, 
                            is_document: isDocument
                        })
                    });
                    const data = await response.json();
                    entities = data.entities;
                    processedSentences = data.processed_sentences || 0;
                    if (data.used_ai) {
                        aiBadge.style.display = 'inline-block';
                    }
                    if (isDocument) {
                        docBadge.style.display = 'inline-block';
                    }
                } else {
                    entities = knowledgeBasedNer(text);
                    entities = addAllPossibleTypes(entities);
                    entities = removeInvalidSingleChars(entities);
                    entities = deduplicateByContext(entities, text);
                    if (textMode === 'document') {
                        docBadge.style.display = 'inline-block';
                    }
                }
                
                displayResults(text, entities, useAi, processedSentences);
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>开始识别</span>';
            }
        }

        async function callApiNer(text, useAi, isDocument = false, useSearch = false) {
            const response = await fetch('/api/ner', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ text: text, use_ai: useAi, is_document: isDocument })
            });

            if (!response.ok) {
                throw new Error('API请求失败，请检查后端服务是否启动');
            }

            const data = await response.json();
            if (data.used_ai) {
                document.getElementById('ai-badge').style.display = 'inline-block';
            }
            return data.entities;
        }

        function displayResults(text, entities, usedAi, processedSentences = 0) {
            const resultSection = document.getElementById('result-section');
            const highlightedText = document.getElementById('highlighted-text');
            const entitiesGrid = document.getElementById('entities-grid');
            const statTotal = document.getElementById('stat-total');
            const statTypes = document.getElementById('stat-types');
            const statSentences = document.getElementById('stat-sentences');
            const aiBadge = document.getElementById('ai-badge');

            if (usedAi) {
                aiBadge.style.display = 'inline-block';
            }

            let highlighted = text;
            const sortedEntities = [...entities].sort((a, b) => b.value.length - a.value.length);
            
            for (const entity of sortedEntities) {
                const color = entityColors[entity.type] || '#FFFF00';
                const escapedValue = entity.value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                highlighted = highlighted.replace(
                    new RegExp(escapedValue, 'g'),
                    `<mark style="background-color: ${color}; padding: 2px 4px; border-radius: 3px;">${entity.value}</mark>`
                );
            }
            
            highlightedText.innerHTML = highlighted;

            entitiesGrid.innerHTML = '';
            entities.forEach(entity => {
                const card = document.createElement('div');
                card.className = 'entity-card';
                card.innerHTML = `
                    <div class="entity-value">${entity.value}</div>
                    <div class="entity-type" style="background-color: ${entityColors[entity.type] || '#999'};">
                        ${entity.type_cn || entity.type}
                    </div>
                `;
                entitiesGrid.appendChild(card);
            });

            statTotal.textContent = entities.length;
            const uniqueTypes = new Set(entities.map(e => e.type)).size;
            statTypes.textContent = uniqueTypes;
            statSentences.textContent = processedSentences || 0;

            resultSection.style.display = 'block';
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const errorMessage = document.getElementById('error-message');
            
            try {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    document.getElementById('input-text').value = content;
                    errorMessage.style.display = 'none';
                };
                
                if (file.name.endsWith('.docx')) {
                    errorMessage.textContent = 'docx格式需要在后端处理，请上传txt或md文件';
                    errorMessage.style.display = 'block';
                    event.target.value = '';
                    return;
                }
                
                reader.readAsText(file, 'utf-8');
            } catch (error) {
                errorMessage.textContent = '文件读取失败: ' + error.message;
                errorMessage.style.display = 'block';
            }
        }

        }

        document.addEventListener('DOMContentLoaded', () => {
            initLegend();
            toggleAiEnhanceSwitch();
            toggleFileUploadSection();

            document.getElementById('submit-btn').addEventListener('click', recognizeText);
            document.getElementById('clear-btn').addEventListener('click', clearContent);

            document.getElementById('input-text').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    recognizeText();
                }
            });

            document.getElementById('file-input').addEventListener('change', handleFileUpload);

            document.querySelectorAll('input[name="ai-mode"]').forEach(radio => {
                radio.addEventListener('change', toggleAiEnhanceSwitch);
            });

            document.querySelectorAll('input[name="text-mode"]').forEach(radio => {
                radio.addEventListener('change', toggleFileUploadSection);
            });

            document.querySelectorAll('.example-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    setExampleText(tag.textContent);
                });
            });
        });
    </script>
</body>
</html>
